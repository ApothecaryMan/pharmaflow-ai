<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Zinc</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Zinc" />
    <meta
      name="description"
      content="نظام إدارة الصيدليات الذكي - Smart Pharmacy Management System"
    />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#111827"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS/iPad Specific Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Zinc" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Favicons & Icons -->
    <link rel="icon" type="image/svg+xml" href="/app_icon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link
      rel="apple-touch-icon"
      sizes="152x152"
      href="/icons/icon-152x152.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="192x192"
      href="/icons/icon-192x192.png"
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Core Typography System (Google Fonts v2) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0,0&display=block"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&display=swap"
      rel="stylesheet"
    />
    <!-- IBM Plex Sans Arabic removed (Inlined in CSS with unicode-range) -->
    <style>
      body {
        font-family:
          var(--font-en), var(--font-ar), "Inter", "Cairo", sans-serif;
      }
      /* Universal Theme System - CSS Variables */
      :root {
        /* Primary Theme Colors - Zinc (Neutral Monochromatic) */
        --primary-50: #fafafa;
        --primary-100: #f4f4f5;
        --primary-200: #e4e4e7;
        --primary-300: #d4d4d8;
        --primary-400: #a1a1aa;
        --primary-500: #71717a;
        --primary-600: #52525b;
        --primary-700: #3f3f46;
        --primary-800: #27272a;
        --primary-900: #18181b;
        --primary-950: #09090b;

        /* Semantic Colors */
        --color-primary: var(--primary-600);
        --color-primary-hover: var(--primary-700);
        --color-primary-light: var(--primary-50);
        --color-primary-dark: var(--primary-800);

        /* Background Colors - Light Mode */
        --bg-primary: transparent; 
        --bg-secondary: #f4f4f5;
        --bg-tertiary: #e4e4e7;
        --bg-accent: #f4f4f58c; 
        --bg-hover: #f4f4f5;

        --bg-navbar: #ffffff;
        --bg-card: #ffffff;
        --bg-input: #ffffff;
        --bg-page-surface: #fafafa; /* Zinc-50: Pure neutral soft grey */
        --bg-surface-neutral: rgba(250, 250, 250, 0.8);
        --bg-statusbar: var(--bg-secondary);
        --bg-menu: #ffffff;
        --bg-menu-hover: #f4f4f5;
        --bg-navbar-hover: var(--bg-menu-hover);
        --button-base-inactive: rgba(244, 244, 245, 0.2); 
        --button-base-active: #9a9a9a;

        /* Text Colors - Light Mode */
        --text-primary: #18181b;
        --text-secondary: #71717a;
        --text-tertiary: #a1a1aa;
        --text-inverse: #ffffff;

        /* Border Colors */
        --border-primary: #e2e8f0;
        --border-secondary: #cbd5e1;
        --border-accent: var(--primary-200);
        --border-divider: #f3f4f6; /* gray-100 */
        --border-search: #e2e8f0;

        /* Shadow Colors */
        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        --shadow-primary: 0 10px 15px -3px var(--primary-500);
      }

      /* Dark Mode Variables */
      .dark {
        --bg-primary: transparent; 
        --bg-secondary: #1a1a1a;
        --bg-tertiary: #333333;
        --bg-accent: #3d3d3d; /* Neutral gray accent */
        --bg-hover: rgba(60, 60, 60, 0.5);

        --bg-navbar: #1f1f1f;
        --bg-card: #323232;
        --bg-input: #1f1f1f;
        --bg-page-surface: #282828;
        --bg-statusbar: var(--bg-navbar);
        --bg-menu: #262626;
        --bg-menu-hover: #323232;
        --bg-navbar-hover: var(--bg-menu-hover);
        --bg-surface-neutral: #2d2d2d;
        --button-base-inactive: rgba(80, 80, 80, 0.4);
        --button-base-active: #141413;

        --text-primary: #f3f4f6;
        --text-secondary: #d1d5db;
        --text-tertiary: #9ca3af;
        --text-inverse: #111827;

        --border-primary: #3d3d3d;
        --border-secondary: #525252;
        --border-accent: var(--primary-700);
        --border-divider: rgba(80, 80, 80, 0.5);
        --border-search: rgba(80, 80, 80, 0.5);

        --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.3);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.3);
      }

      /* Utility Classes for Theme */
      .bg-theme-primary {
        background-color: var(--color-primary) !important;
      }
      .bg-theme-light {
        background-color: var(--color-primary-light) !important;
      }
      .bg-theme-hover:hover {
        background-color: var(--color-primary-hover) !important;
      }

      .text-theme-primary {
        color: var(--color-primary) !important;
      }
      .text-theme-hover:hover {
        color: var(--color-primary-hover) !important;
      }

      .border-theme-primary {
        border-color: var(--color-primary) !important;
      }
      .border-theme-accent {
        border-color: var(--border-accent) !important;
      }

      /* Hide ALL scrollbars globally */
      * {
        -ms-overflow-style: none; /* IE and Edge */
        scrollbar-width: none; /* Firefox */
      }
      *::-webkit-scrollbar {
        display: none; /* Chrome, Safari, Opera */
      }
      /* Material Symbol utility */
      .material-symbols-rounded {
        display: inline-block;
        line-height: 1;
        vertical-align: middle;
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 20;
      }
      .icon-filled {
        font-variation-settings:
          "FILL" 1,
          "wght" 400,
          "GRAD" 0,
          "opsz" 20;
      }

      /* Text Transform Utility */
      :root {
        --text-transform: none;
      }

      .uppercase-mode .drug-name,
      .uppercase-mode .item-name {
        text-transform: uppercase !important;
      }

      /* Hide Number Input Arrows */
      /* Chrome, Safari, Edge, Opera */
      input::-webkit-outer-spin-button,
      input::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }
      /* Firefox */
      input[type="number"] {
        -moz-appearance: textfield;
        appearance: textfield;
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "react/": "https://aistudiocdn.com/react@^19.2.0/",
          "react": "https://aistudiocdn.com/react@^19.2.0",
          "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
          "qrcode": "https://aistudiocdn.com/qrcode@^1.5.3"
        }
      }
    </script>
  </head>
  <body
    class="bg-[#f9fafb] dark:bg-[#282828] text-gray-900 dark:text-gray-50 transition-colors duration-300"
  >
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((registration) => {
              console.log("✅ Service Worker registered:", registration.scope);
            })
            .catch((error) => {
              console.log("❌ Service Worker registration failed:", error);
            });
        });
      }
    </script>
  </body>
</html>

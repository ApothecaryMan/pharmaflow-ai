<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Resource Hints: Accelerate connections to critical services -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <title>ZINC</title>
    <script src="/preflight.js"></script>

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <!-- PWA Meta Tags -->
    <meta name="application-name" content="ZINC" />
    <meta
      name="description"
      content="نظام إدارة الصيدليات الذكي - Smart Pharmacy Management System"
    />
    <meta name="theme-color" content="#1f1f1f" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS/iPad Specific Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="ZINC" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Favicons & Icons -->
    <link rel="icon" type="image/svg+xml" href="/app_icon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link
      rel="apple-touch-icon"
      sizes="152x152"
      href="/icons/icon-152x152.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="192x192"
      href="/icons/icon-192x192.png"
    />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Global Typography System imported via index.css -->


    <script type="importmap">
      {
        "imports": {
          "react/": "https://aistudiocdn.com/react@^19.2.0/",
          "react": "https://aistudiocdn.com/react@^19.2.0",
          "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
          "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
          "qrcode": "https://aistudiocdn.com/qrcode@^1.5.3"
        }
      }
    </script>
    <script>
      // Force hide icon ligatures until font is actually ready to render
      if ('fonts' in document) {
        document.fonts.load('24px "Material Symbols Rounded"').then(() => {
          document.documentElement.classList.add('fonts-loaded');
        }).catch(() => {
          // Fallback if loading fails, show text after 3s anyway
          setTimeout(() => document.documentElement.classList.add('fonts-loaded'), 3000);
        });
      } else {
        // Fallback for older browsers
        document.documentElement.classList.add('fonts-loaded');
      }
    </script>
  </head>
  <body
    class="bg-[var(--bg-page-surface)] text-[var(--text-primary)]"
  >
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ("serviceWorker" in navigator && !window.__TAURI_INTERNALS__) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("/sw.js")
            .then((registration) => {
              // console.log("✅ Service Worker registered:", registration.scope);
            })
            .catch((error) => {
              console.log("❌ Service Worker registration failed:", error);
            });
        });
      }
    </script>
  </body>
</html>

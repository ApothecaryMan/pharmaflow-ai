<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="100%" height="100%">
  <defs>
    <!-- شبكة خلفية دقيقة بكسلية -->
    <pattern id="grid" width="10" height="10" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.08" />
    </pattern>
    <style>
      .bg { fill: #111111; }
      .p { fill: #ffffff; }
    </style>
  </defs>

  <!-- 1. خلفية سوداء تماماً -->
  <rect width="480" height="480" class="bg" rx="24" />

  <!-- 2. خطوط الشبكة الإرشادية -->
  <rect width="480" height="480" fill="url(#grid)" rx="24" />

  <!-- 3. حرف Z بضلع مائل سميك وضخم جداً يملأ المنتصف بالكامل (Bold Thick Diagonal) -->
  <g class="p">
    <!-- ===== الضلع العلوي الأفقي (سميك وغير منتظم) ===== -->
    <path d="
      M60,40 h400
      M50,50 h420
      M50,60 h420
      M50,70 h420
      M50,80 h420
      M50,90 h420
      M60,100 h410
      M70,110 h380
      M80,120 h360
    " stroke="#ffffff" stroke-width="8" stroke-dasharray="8 2" />

    <!-- ===== الضلع المائل: سميك جداً وضخم (بسُمْك 14-16 مربعاً) كما بالصورة تماماً ===== -->
    <path d="
      M280,120 h160
      M260,130 h160
      M240,140 h160
      M220,150 h160
      M200,160 h160
      M180,170 h160
      M160,180 h160
      M140,190 h160
      M130,200 h160
      M120,210 h160
      M110,220 h160
      M100,230 h160
      M90,240 h160
      M80,250 h160
      M70,260 h160
      M60,270 h160
      M50,280 h160
      M40,290 h160
      M40,300 h160
      M40,310 h160
      M40,320 h160
      M40,330 h160
    " stroke="#ffffff" stroke-width="8" stroke-dasharray="8 2" />

    <!-- ===== الضلع السفلي الأفقي (سميك وغير منتظم) ===== -->
    <path d="
      M40,340 h380
      M40,350 h400
      M40,360 h410
      M40,370 h420
      M30,380 h430
      M30,390 h430
      M30,400 h430
      M40,410 h420
      M40,420 h410
      M50,430 h390
      M70,440 h340
    " stroke="#ffffff" stroke-width="8" stroke-dasharray="8 2" />
  </g>
</svg>
